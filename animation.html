<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>골든 리트리버 산책</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #87CEEB;
      overflow: hidden;
      height: 100vh;
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      cursor: none;
      user-select: none;
    }

    /* Sky */
    .sky {
      position: fixed; inset: 0;
      background: linear-gradient(180deg,
        #4fa8d8 0%, #87CEEB 40%, #b8e4f5 64%,
        #c8efaa 68%, #8BC34A 73%, #5a9020 100%);
    }

    /* Sun */
    .sun {
      position: fixed; top: 55px; right: 110px;
      width: 72px; height: 72px;
      background: radial-gradient(circle, #fffde0, #ffe040);
      border-radius: 50%;
      box-shadow: 0 0 50px 25px rgba(255,220,50,0.35);
      animation: sunPulse 4s ease-in-out infinite;
    }
    @keyframes sunPulse {
      0%,100% { box-shadow: 0 0 50px 25px rgba(255,220,50,0.35); }
      50%      { box-shadow: 0 0 70px 35px rgba(255,220,50,0.55); }
    }

    /* Clouds */
    .cloud { position: fixed; background: white; border-radius: 50px; opacity: 0.88; }
    .cloud::before, .cloud::after { content:''; position: absolute; background: white; border-radius: 50%; }
    .cloud1 { top:75px;  width:130px; height:38px; animation: floatCloud 30s linear infinite; left:-160px; }
    .cloud1::before { width:65px;  height:58px; top:-32px; left:20px; }
    .cloud1::after  { width:48px;  height:48px; top:-24px; left:58px; }
    .cloud2 { top:140px; width:95px;  height:30px; animation: floatCloud 42s linear infinite; animation-delay:-15s; left:-130px; }
    .cloud2::before { width:48px;  height:44px; top:-26px; left:14px; }
    .cloud2::after  { width:36px;  height:36px; top:-18px; left:45px; }
    .cloud3 { top:45px;  width:105px; height:34px; animation: floatCloud 55s linear infinite; animation-delay:-35s; left:-140px; }
    .cloud3::before { width:52px;  height:50px; top:-28px; left:16px; }
    .cloud3::after  { width:42px;  height:40px; top:-22px; left:50px; }
    @keyframes floatCloud {
      from { transform: translateX(0); }
      to   { transform: translateX(calc(100vw + 220px)); }
    }

    /* Trees */
    .tree { position: fixed; bottom: 28vh; }
    .tree-trunk { width:16px; background:#7a5230; border-radius:4px; margin:0 auto; }
    .tree-top   { border-radius: 50% 50% 40% 40%; }

    /* Road */
    .road {
      position: fixed; bottom:0; left:0; right:0; height:28vh;
      background: linear-gradient(180deg, #8a8a8a 0%, #a0a0a0 100%);
    }
    .road::before {
      content:''; position:absolute; top:0; left:0; right:0;
      height:5px; background:rgba(255,255,255,0.12);
    }
    .road-line { position:absolute; top:50%; left:0; right:0; height:4px; overflow:hidden; }
    .road-line-inner { display:flex; gap:40px; animation: roadMove 1s linear infinite; }
    .road-dash { display:inline-block; width:60px; height:4px; background:rgba(255,255,255,0.55); border-radius:2px; flex-shrink:0; }
    @keyframes roadMove {
      from { transform: translateX(0); }
      to   { transform: translateX(-100px); }
    }

    /* Paw prints */
    .paw-container { position:fixed; bottom:28vh; left:0; right:0; height:64px; pointer-events:none; overflow:hidden; }
    .paw { position:absolute; bottom:8px; font-size:18px; opacity:0; animation: pawAppear 1.2s ease forwards; }
    @keyframes pawAppear {
      0%  { opacity:0; transform:scale(0.4) translateY(8px); }
      35% { opacity:0.65; transform:scale(1) translateY(0); }
      100%{ opacity:0; }
    }

    /* Dog shadow */
    .dog-shadow {
      position:absolute; bottom:-6px; left:50%; transform:translateX(-50%);
      width:90px; height:18px; background:rgba(0,0,0,0.25);
      border-radius:50%; filter:blur(4px);
    }

    /* Dog wrapper & base */
    .dog-wrapper { position:fixed; bottom:28vh; left:0; }

    .dog {
      width:150px; position:relative; bottom:0;
      transform-origin: bottom center;
      cursor: pointer;
    }
    .dog img {
      width:100%; display:block;
      filter: drop-shadow(2px 6px 10px rgba(0,0,0,0.35));
    }

    /* === Movement animations === */
    .move-walk {
      animation: dogWalk 0.45s ease-in-out infinite alternate;
    }
    @keyframes dogWalk {
      0%   { transform: translateY(0px)   rotate(-1.5deg) scaleX(1); }
      100% { transform: translateY(-10px) rotate(1.5deg)  scaleX(1); }
    }

    .move-run {
      animation: dogRun 0.22s ease-in-out infinite alternate;
    }
    @keyframes dogRun {
      0%   { transform: translateY(0px)   rotate(-3deg) scaleX(1.05); }
      100% { transform: translateY(-16px) rotate(3deg)  scaleX(0.95); }
    }

    .move-sit {
      animation: dogSit 0.4s ease forwards;
    }
    @keyframes dogSit {
      0%   { transform: translateY(0)    scaleY(1)    rotate(0); }
      100% { transform: translateY(18px) scaleY(0.78) rotate(0); }
    }

    .move-sniff {
      animation: dogSniff 0.6s ease-in-out infinite alternate;
    }
    @keyframes dogSniff {
      0%   { transform: translateY(0)   rotate(-8deg); }
      100% { transform: translateY(8px) rotate(8deg); }
    }

    .move-spin {
      animation: dogSpin 0.5s ease-in-out;
    }
    @keyframes dogSpin {
      0%   { transform: rotate(0deg)   scale(1); }
      50%  { transform: rotate(180deg) scale(1.15); }
      100% { transform: rotate(360deg) scale(1); }
    }

    .move-jump {
      animation: dogJump 0.7s ease forwards;
    }
    @keyframes dogJump {
      0%   { transform: translateY(0)    scale(1)    rotate(0); }
      35%  { transform: translateY(-80px) scale(1.15) rotate(10deg); }
      65%  { transform: translateY(-45px) scale(1.07) rotate(-5deg); }
      100% { transform: translateY(0)    scale(1)    rotate(0); }
    }

    .move-roll {
      animation: dogRoll 0.8s ease forwards;
    }
    @keyframes dogRoll {
      0%   { transform: translateY(0)    rotate(0)    scale(1); }
      25%  { transform: translateY(10px) rotate(90deg)  scale(0.9); }
      50%  { transform: translateY(15px) rotate(180deg) scale(0.85); }
      75%  { transform: translateY(10px) rotate(270deg) scale(0.9); }
      100% { transform: translateY(0)    rotate(360deg) scale(1); }
    }

    .move-shake {
      animation: dogShake 0.5s ease;
    }
    @keyframes dogShake {
      0%,100% { transform: rotate(0) scaleX(1); }
      15%  { transform: rotate(-8deg) scaleX(1.1); }
      30%  { transform: rotate(8deg)  scaleX(0.9); }
      45%  { transform: rotate(-6deg) scaleX(1.05); }
      60%  { transform: rotate(6deg)  scaleX(0.95); }
      75%  { transform: rotate(-3deg) scaleX(1.02); }
    }

    /* Speech bubble */
    .speech {
      position:absolute; bottom:158px; left:50%;
      transform:translateX(-50%);
      background:white; border-radius:18px;
      padding:9px 15px; font-size:0.82rem; font-weight:700;
      color:#4a3728; white-space:nowrap;
      box-shadow:0 4px 14px rgba(0,0,0,0.18);
      opacity:0; pointer-events:none;
      transition: opacity 0.25s;
      z-index: 10;
    }
    .speech::after {
      content:''; position:absolute; bottom:-9px; left:50%;
      transform:translateX(-50%);
      border:9px solid transparent; border-top-color:white; border-bottom:none;
    }
    .speech.show { opacity:1; }

    /* === HUD (Score) === */
    .hud {
      position: fixed; top: 18px; left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      pointer-events: none;
    }

    .score-box {
      background: rgba(255,255,255,0.92);
      border-radius: 50px;
      padding: 8px 28px;
      display: flex; align-items: center; gap: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .score-label { font-size: 0.78rem; font-weight: 600; color: #a07848; }

    .score-value {
      font-size: 1.6rem; font-weight: 900; color: #e06020;
      min-width: 60px; text-align: center;
      transition: transform 0.15s;
    }
    .score-value.pop { animation: scorePop 0.35s ease; }
    @keyframes scorePop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.45); color: #ff4400; }
      100% { transform: scale(1); }
    }

    .level-bar-wrap {
      width: 180px; height: 8px;
      background: rgba(255,255,255,0.35);
      border-radius: 4px; overflow: hidden;
    }
    .level-bar {
      height: 100%;
      background: linear-gradient(90deg, #f5c55a, #e06020);
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    .level-label {
      font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.9);
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
      letter-spacing: 1px;
    }

    /* Floating score popup */
    .score-popup {
      position: fixed;
      font-size: 1.2rem; font-weight: 900;
      color: #ff6600;
      pointer-events: none;
      text-shadow: 0 2px 6px rgba(0,0,0,0.25);
      animation: scoreFloat 1.2s ease forwards;
      z-index: 50;
    }
    @keyframes scoreFloat {
      0%   { transform: translateY(0)    scale(0.6); opacity: 1; }
      60%  { transform: translateY(-50px) scale(1.2); opacity: 1; }
      100% { transform: translateY(-90px) scale(1);   opacity: 0; }
    }
    .miss-popup {
      position: fixed;
      font-size: 1.1rem; font-weight: 900;
      color: #888;
      pointer-events: none;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
      animation: scoreFloat 1.1s ease forwards;
      z-index: 50;
    }

    /* === Snack bar === */
    .snack-bar {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.92);
      border-radius: 50px;
      padding: 10px 18px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.18);
      z-index: 20;
    }

    .snack-label {
      font-size: 0.75rem; font-weight: 700; color: #a07848;
      margin-right: 4px; white-space: nowrap;
    }

    .snack-btn {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      background: none; border: 2px solid transparent;
      border-radius: 16px; padding: 7px 10px;
      cursor: pointer; transition: all 0.2s;
      position: relative;
    }
    .snack-btn:hover {
      background: rgba(245,197,90,0.15);
      border-color: rgba(245,197,90,0.5);
      transform: translateY(-3px);
    }
    .snack-btn:active { transform: scale(0.92); }
    .snack-btn.selected {
      background: rgba(245,197,90,0.3);
      border-color: #e06020;
      transform: translateY(-4px);
      box-shadow: 0 4px 12px rgba(224,96,32,0.3);
    }

    .snack-btn .icon { font-size: 1.5rem; line-height: 1; }
    .snack-btn .name { font-size: 0.62rem; font-weight: 600; color: #7a5838; }
    .snack-btn .pts  { font-size: 0.62rem; font-weight: 800; color: #e06020; }

    .snack-btn .cooldown-ring {
      position: absolute; inset: 0;
      border-radius: 14px;
      background: rgba(0,0,0,0.35);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; color: white; font-weight: 700;
      opacity: 0; pointer-events: none;
      transition: opacity 0.15s;
    }
    .snack-btn.cooling .cooldown-ring { opacity: 1; }
    .snack-btn.cooling { pointer-events: none; }

    .lock-overlay {
      position: absolute; inset: 0;
      border-radius: 14px;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center; justify-content: center;
      font-size: 1.1rem;
      pointer-events: none;
    }
    .snack-btn.locked .lock-overlay { display: flex; }
    .snack-btn.locked {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .snack-btn.locked:hover {
      background: none;
      border-color: transparent;
      transform: none;
    }

    @media (max-width: 600px) {
      /* 간식바 */
      .snack-bar {
        padding: 7px 8px;
        gap: 4px;
        bottom: 12px;
        width: calc(100vw - 16px);
        justify-content: center;
      }
      .snack-label { display: none; }
      .snack-btn { padding: 5px 6px; }
      .snack-btn .icon { font-size: 1.4rem; }
      .snack-btn .name { font-size: 0.55rem; white-space: nowrap; }
      .snack-btn .pts  { font-size: 0.55rem; }

      /* HUD 점수 */
      .score-box { padding: 6px 14px; gap: 8px; }
      .score-label { font-size: 0.7rem; }
      .score-value { font-size: 1.3rem; }

      /* 기분 표시 숨김 (공간 확보) */
      .mood { display: none; }
    }

    /* Hearts */
    .heart { position:fixed; font-size:1.3rem; pointer-events:none; animation: heartFloat 1.2s ease forwards; z-index:20; }
    @keyframes heartFloat {
      0%   { transform: translateY(0)    scale(0.5); opacity:1; }
      100% { transform: translateY(-90px) scale(1.3); opacity:0; }
    }

    /* Thrown snack */
    .thrown-snack {
      position: fixed;
      font-size: 1.5rem;
      pointer-events: none;
      z-index: 30;
      animation: throwArc var(--dur) cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }
    @keyframes throwArc {
      0%   { transform: translate(0, 0)   rotate(0deg)   scale(1); opacity: 1; }
      40%  { transform: translate(var(--mx), var(--my)) rotate(180deg) scale(1.2); opacity: 1; }
      100% { transform: translate(var(--ex), var(--ey)) rotate(360deg) scale(0.5); opacity: 0; }
    }

    /* Cursor */
    .custom-cursor { position:fixed; pointer-events:none; font-size:22px; transform:translate(-50%,-50%); z-index:9999; }

    /* Mood indicator */
    .mood {
      position: fixed; top: 18px; right: 20px;
      background: rgba(255,255,255,0.88);
      border-radius: 20px; padding: 8px 14px;
      font-size: 0.8rem; font-weight: 700; color: #4a3728;
      box-shadow: 0 3px 12px rgba(0,0,0,0.12);
      z-index: 20;
      transition: all 0.3s;
    }

    /* Achievement toast */
    .toast {
      position: fixed; top: 90px; left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #f5c55a, #e06020);
      color: white; border-radius: 20px;
      padding: 10px 24px; font-size: 0.9rem; font-weight: 700;
      box-shadow: 0 6px 20px rgba(224,96,32,0.4);
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }

    /* ── Tutorial overlay ── */
    #tutorial {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
      backdrop-filter: blur(4px);
      transition: opacity 0.4s;
    }
    #tutorial.hide { opacity: 0; pointer-events: none; }

    .tutorial-box {
      background: white;
      border-radius: 28px;
      padding: 36px 40px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    .tutorial-box .dog-thumb {
      width: 100px; height: 100px;
      object-fit: contain; margin-bottom: 12px;
    }
    .tutorial-box h2 {
      font-size: 1.5rem; font-weight: 900;
      color: #4a3728; margin-bottom: 4px;
    }
    .tutorial-box .subtitle {
      font-size: 0.82rem; color: #a07848; margin-bottom: 20px;
    }
    .tutorial-steps {
      list-style: none; text-align: left;
      display: flex; flex-direction: column; gap: 12px;
      margin-bottom: 24px;
    }
    .tutorial-steps li {
      display: flex; align-items: flex-start; gap: 12px;
      font-size: 0.92rem; color: #4a3728; font-weight: 500;
      line-height: 1.5; word-break: keep-all;
    }
    .step-num {
      width: 28px; height: 28px; min-width: 28px; flex-shrink: 0;
      background: linear-gradient(135deg, #f5c55a, #e06020);
      color: white; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 800;
      margin-top: 2px;
    }
    .tutorial-start {
      width: 100%;
      background: linear-gradient(135deg, #f5c55a, #e06020);
      color: white; border: none; border-radius: 50px;
      padding: 14px; font-size: 1rem; font-weight: 800;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(224,96,32,0.35);
      transition: transform 0.15s;
    }
    .tutorial-start:hover  { transform: translateY(-2px); }
    .tutorial-start:active { transform: scale(0.97); }

    /* ── Dog name tag ── */
    .dog-nametag {
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.92);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.78rem; font-weight: 800;
      color: #b5681e;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    /* ── Video popup ── */
    #video-popup {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.82);
      display: flex; align-items: center; justify-content: center;
      z-index: 300;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s;
    }
    #video-popup.show {
      opacity: 1; pointer-events: auto;
    }
    .video-popup-inner {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      max-width: 480px;
      width: 90vw;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }
    .video-popup-inner video {
      width: 100%; display: block;
      border-radius: 24px;
    }
    .video-popup-label {
      position: absolute;
      top: 14px; left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #f5c55a, #e06020);
      color: white; border-radius: 50px;
      padding: 7px 20px;
      font-size: 0.9rem; font-weight: 900;
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(224,96,32,0.4);
      z-index: 1;
    }
    .video-close-btn {
      position: absolute; top: 12px; right: 12px;
      background: rgba(0,0,0,0.55); color: white;
      border: none; border-radius: 50%;
      width: 36px; height: 36px;
      font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 1;
      transition: background 0.2s;
    }
    .video-close-btn:hover { background: rgba(0,0,0,0.8); }

    /* ── Level-up overlay ── */
    #levelup-overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 150;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }
    #levelup-overlay.show { opacity: 1; }
    .levelup-box {
      background: linear-gradient(135deg, #fff9e6, #fff3cc);
      border: 3px solid #f5c55a;
      border-radius: 28px;
      padding: 32px 40px;
      text-align: center;
      box-shadow: 0 16px 48px rgba(224,96,32,0.3);
      animation: levelupPop 0.5s ease;
    }
    @keyframes levelupPop {
      0%   { transform: scale(0.6); }
      70%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    .levelup-box .lvl-icon { font-size: 3rem; margin-bottom: 8px; }
    .levelup-box h2 { font-size: 1.6rem; font-weight: 900; color: #e06020; }
    .levelup-box p  { font-size: 0.9rem; color: #a07848; margin-top: 6px; }

    /* ── Hunger gauge ── */
    .hunger-wrap {
      width: 180px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .hunger-label {
      font-size: 0.68rem; font-weight: 700;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 1px 4px rgba(0,0,0,0.3);
      letter-spacing: 1px;
    }
    .hunger-bar-wrap {
      width: 180px; height: 8px;
      background: rgba(255,255,255,0.35);
      border-radius: 4px; overflow: hidden;
    }
    .hunger-bar {
      height: 100%;
      background: linear-gradient(90deg, #ff8800, #ffcc00);
      border-radius: 4px;
      transition: width 0.5s ease, background 0.3s;
      width: 100%;
    }
    .hunger-bar.critical {
      background: linear-gradient(90deg, #ff2200, #ff6600);
      animation: hungerPulse 0.5s ease-in-out infinite alternate;
    }
    @keyframes hungerPulse {
      0%   { opacity: 1; }
      100% { opacity: 0.4; }
    }

    /* ── Obstacle ── */
    .obstacle {
      position: fixed;
      bottom: calc(28vh + 10px);
      font-size: 2.8rem;
      pointer-events: auto;
      cursor: pointer;
      z-index: 15;
      animation: obstacleSlide var(--dur) linear forwards;
      user-select: none;
      background: rgba(255, 80, 0, 0.18);
      border: 2.5px solid rgba(255, 100, 0, 0.7);
      border-radius: 14px;
      padding: 6px 10px;
      box-shadow: 0 0 14px 3px rgba(255, 80, 0, 0.35);
      min-width: 56px;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @media (max-width: 600px) {
      .obstacle {
        font-size: 2.2rem;
        min-width: 64px;
        min-height: 64px;
        padding: 8px 12px;
        border-width: 3px;
        box-shadow: 0 0 18px 5px rgba(255, 80, 0, 0.45);
      }
    }
    @keyframes obstacleSlide {
      from { right: -80px; }
      to   { right: 110vw; }
    }
    .obstacle-hit {
      animation: obstacleHit 0.3s ease forwards !important;
    }
    @keyframes obstacleHit {
      0%   { transform: scale(1); opacity: 1; }
      50%  { transform: scale(1.5) rotate(30deg); opacity: 0.8; }
      100% { transform: scale(0); opacity: 0; }
    }

    /* ── Combo display ── */
    .combo-display {
      font-size: 0.9rem; font-weight: 900;
      color: #ff6600;
      text-shadow: 0 2px 6px rgba(255,100,0,0.5);
      min-height: 1.2rem;
      transition: all 0.2s;
      letter-spacing: 1px;
    }
    .combo-display.active {
      animation: comboPop 0.3s ease;
    }
    @keyframes comboPop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.4); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <!-- Snack bar -->
  <div class="snack-bar">
    <span class="snack-label">간식 선택 👇</span>
    <button class="snack-btn" data-snack="chicken" data-pts="25"  data-cd="3000" data-unlock-level="1" onclick="selectSnack(this)">
      <span class="icon">🍗</span>

      <div class="lock-overlay"></div>
    </button>
    <button class="snack-btn" data-snack="cake"    data-pts="40"  data-cd="6000" data-ground="true" data-unlock-level="2" onclick="selectSnack(this)">
      <span class="icon">🎂</span>
      <span class="name">케이크</span>
      <span class="pts">+40</span>
      <div class="cooldown-ring"></div>
      <div class="lock-overlay">🔒</div>
    </button>
    <button class="snack-btn" data-snack="steak"   data-pts="60"  data-cd="10000" data-ground="true" data-unlock-level="3" onclick="selectSnack(this)">
      <span class="icon">🥩</span>
      <span class="name">스테이크</span>
      <span class="pts">+60</span>
      <div class="cooldown-ring"></div>
      <div class="lock-overlay">🔒</div>
    </button>
  </div>

  <script>
    // ── Video popup ──
    const VIDEO_SOURCES = {
      2: 'video1.mp4',
      3: 'video2.mp4',
    };
    const VIDEO_LABELS = {
      2: '🐶 Level 2 달성! 써니가 성장했어요!',
      3: '🌟 Level 3 달성! 최고의 써니!',
    };
    let videoPopupOpen = false;

    function showVideoPopup(level) {
      const popup = document.getElementById('video-popup');
      const video = document.getElementById('popupVideo');
      const label = document.getElementById('videoLabel');
      label.textContent = VIDEO_LABELS[level] || '🎉 레벨 업!';
      video.muted = true;
      video.src = VIDEO_SOURCES[level];
      popup.classList.add('show');
      videoPopupOpen = true;
      video.addEventListener('ended', closeVideoPopup, { once: true });
      video.addEventListener('canplay', () => video.play().catch(() => {}), { once: true });
    }

    function closeVideoPopup() {
      const popup = document.getElementById('video-popup');
      const video = document.getElementById('popupVideo');
      video.pause();
      video.src = '';
      popup.classList.remove('show');
      videoPopupOpen = false;
    }

    // ── Tutorial ──
    function startGame() {
      const t = document.getElementById('tutorial');
      t.classList.add('hide');
      setTimeout(() => t.style.display = 'none', 400);
      updateSnackAvailability();
      startHungerSystem();
      scheduleAutoJump();
      scheduleObstacle();
    }

    // ── Dog images per level ──
    const DOG_IMAGES = {
      1: 'dog_cutout.png',
      2: 'level2_cutout.png',
      3: 'level3_cutout.png',
    };
    let currentDogLevel = 1;

    function getDogLevel(s) {
      if (s >= 200) return 3;
      if (s >= 80)  return 2;
      return 1;
    }

    function updateDogImage(newDogLevel, lvName) {
      if (newDogLevel === currentDogLevel) return;
      currentDogLevel = newDogLevel;
      const img = document.getElementById('dogImg');

      // Fade out → swap → fade in
      img.style.transition = 'opacity 0.4s';
      img.style.opacity = '0';
      setTimeout(() => {
        img.src = DOG_IMAGES[newDogLevel];
        img.style.opacity = '1';
      }, 400);

      // Video popup 레벨업 영상
      setTimeout(() => showVideoPopup(newDogLevel), 500);
    }

    // ── Road dashes ──
    const roadLine = document.getElementById('roadLine');
    for (let i = 0; i < 35; i++) {
      const d = document.createElement('div'); d.className = 'road-dash'; roadLine.appendChild(d);
    }

    // ── Cursor ──
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });

    // ── State ──
    let x          = -180;
    let speed      = 4.2;
    let score      = 0;
    let lastPawX   = -999;
    let isBusy     = false;   // dog is doing a special move
    let speechTO   = null;
    let moodTimer  = null;
    let currentMove = 'run';

    let dogY = 0;       // 현재 Y 오프셋 (px, 양수=위)
    let dogVY = 0;      // 수직 속도
    let isAutoJumping = false;
    const GRAVITY = 0.55;

    // ── Hunger & Combo state ──
    let hunger = 100;
    let lastSnackTime = 0;
    let comboCount = 0;
    let comboTimer = null;
    const COMBO_WINDOW = 5000;
    const HUNGER_RECOVERY = { chicken: 25, cake: 40, steak: 60 };

    // ── Obstacle state ──
    let obstacleTimeout = null;
    const OBSTACLES = [
      { emoji: '🐱', penalty: 15, label: '고양이' },
      { emoji: '💧', penalty: 10, label: '웅덩이' },
      { emoji: '🚲', penalty: 20, label: '자전거' },
      { emoji: '🛹', penalty: 18, label: '스케이터' },
      { emoji: '🚛', penalty: 25, label: '트럭' },
      { emoji: '🌳', penalty: 12, label: '나무' },
    ];

    const dog         = document.getElementById('dog');
    const dogWrapper  = document.getElementById('dogWrapper');
    const speech      = document.getElementById('speech');
    const scoreVal    = document.getElementById('scoreVal');
    const levelBar    = document.getElementById('levelBar');
    const levelLabel  = document.getElementById('levelLabel');
    const levelName   = document.getElementById('levelName');
    const moodEl      = document.getElementById('mood');
    const toast       = document.getElementById('toast');
    const pawContainer = document.getElementById('pawContainer');

    // ── Levels (3단계) ──
    const LEVELS = [
      { min:0,   label:'Level 1', name:'Level 1' },
      { min:80,  label:'Level 2', name:'Level 2' },
      { min:200, label:'Level 3', name:'Level 3' },
    ];

    function getLevel(s) {
      let lv = LEVELS[0];
      for (const l of LEVELS) { if (s >= l.min) lv = l; }
      return lv;
    }

    function getNextLevel(s) {
      for (let i = 0; i < LEVELS.length - 1; i++) {
        if (s < LEVELS[i+1].min) return LEVELS[i+1];
      }
      return null;
    }

    function updateHUD(added) {
      scoreVal.textContent = score;
      scoreVal.classList.remove('pop');
      void scoreVal.offsetWidth;
      scoreVal.classList.add('pop');

      const lv   = getLevel(score);
      const next = getNextLevel(score);
      levelLabel.textContent = lv.label;
      levelName.textContent  = lv.name;

      if (next) {
        const pct = ((score - lv.min) / (next.min - lv.min)) * 100;
        levelBar.style.width = Math.min(pct, 100) + '%';
        if (score >= next.min && (score - added) < next.min) {
          showToast('🎉 ' + next.name + ' 달성! 써니가 성장했어요!');
        }
      } else {
        levelBar.style.width = '100%';
      }

      // Dog image switch
      const newDogLevel = getDogLevel(score);
      if (newDogLevel !== currentDogLevel) {
        updateDogImage(newDogLevel, lv.name);
      }
      updateSnackAvailability();
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ── Score popup ──
    function spawnScorePopup(pts, dogX) {
      const el = document.createElement('div');
      el.className = 'score-popup';
      el.textContent = '+' + pts;
      el.style.left = (dogX + 20 + Math.random() * 40) + 'px';
      el.style.top  = (window.innerHeight * 0.72 - 60) + 'px';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    // ── Mood ──
    const MOODS = [
      { min:0,   emoji:'😐', text:'보통' },
      { min:50,  emoji:'😊', text:'기분 좋음' },
      { min:150, emoji:'😄', text:'신남!' },
      { min:300, emoji:'🤩', text:'최고야!!' },
      { min:600, emoji:'🥰', text:'너무 행복해' },
    ];
    function updateMood() {
      let m = MOODS[0];
      for (const mood of MOODS) { if (score >= mood.min) m = mood; }
      moodEl.textContent = m.emoji + ' ' + m.text;
    }

    function updateSnackAvailability() {
      const lv = getDogLevel(score);
      document.querySelectorAll('.snack-btn[data-unlock-level]').forEach(btn => {
        const required = parseInt(btn.dataset.unlockLevel);
        if (lv >= required) {
          btn.classList.remove('locked');
        } else {
          btn.classList.add('locked');
          // 잠긴 버튼이 선택 중이었다면 해제
          if (selectedSnackBtn === btn) {
            btn.classList.remove('selected');
            selectedSnackBtn = null;
            cursor.textContent = '🦴';
          }
        }
      });
    }

    // ── Paw prints ──
    function spawnPaw(px) {
      const p = document.createElement('div');
      p.className = 'paw';
      p.textContent = '🐾';
      p.style.left = px + 'px';
      p.style.animationDuration = (0.9 + Math.random() * 0.4) + 's';
      pawContainer.appendChild(p);
      p.addEventListener('animationend', () => p.remove());
    }

    // ── Walk loop ──
    function loop() {
      if (!isBusy || currentMove === 'run') {
        x += speed * (currentMove === 'run' ? 2.2 : 1);
        if (x > window.innerWidth + 20) x = -180;
        // Y 물리
        if (isAutoJumping || dogVY !== 0 || dogY > 0) {
          dogVY -= GRAVITY;
          dogY += dogVY;
          if (dogY <= 0) {
            dogY = 0;
            dogVY = 0;
            isAutoJumping = false;
          }
        }
        dogWrapper.style.transform = `translateX(${x}px) translateY(${-Math.max(0, dogY)}px)`;
        if (x - lastPawX > (currentMove === 'run' ? 38 : 55)) {
          spawnPaw(x + 35); lastPawX = x;
        }
      }
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    // ── Speech ──
    const SPEECHES = {
      bone:    ['뼈다귀다! 🦴', '최애 간식!', '냠냠!'],
      chicken: ['치킨이다! 🍗', '이게 진짜지!', '행복해~'],
      cake:    ['케이크다! 🎂', '달콤해요!', '이게 최고야!'],
      cookie:  ['쿠키! 🍪', '달콤해!', '또 줘요!'],
      ball:    ['공이다! 🎾', '던져줘! 던져줘!', '물어올게요!'],
      steak:   ['스테이크?!!! 🥩', '최고의 집사!!!', '사랑해요!!! 💛'],
      hunger:  ['배고파요... 😢', '간식 주세요!', '꼬르륵...'],
      hurt:    ['아야! 😣', '으악!', '아파요 ㅠㅠ'],
      miss:    ['놓쳤다! 😅', '아, 아쉬워!', '다시 줘요~'],
    };

    function showSpeech(type) {
      const arr = SPEECHES[type];
      const msg = arr[Math.floor(Math.random() * arr.length)];
      speech.textContent = msg;
      speech.classList.add('show');
      if (speechTO) clearTimeout(speechTO);
      speechTO = setTimeout(() => speech.classList.remove('show'), 2000);
    }

    // ── Thrown snack animation ──
    function throwSnack(emoji, targetX, targetY) {
      const el = document.createElement('div');
      el.className = 'thrown-snack';
      el.textContent = emoji;

      const startX = window.innerWidth * 0.5;
      const startY = window.innerHeight - 80;
      el.style.left = startX + 'px';
      el.style.top  = startY + 'px';

      const ex = targetX - startX;
      const ey = targetY - startY;
      const mx = ex * 0.5;
      const my = Math.min(-120, ey * 0.4);
      const dur = 0.55 + Math.random() * 0.2;

      el.style.setProperty('--ex', ex + 'px');
      el.style.setProperty('--ey', ey + 'px');
      el.style.setProperty('--mx', mx + 'px');
      el.style.setProperty('--my', my + 'px');
      el.style.setProperty('--dur', dur + 's');

      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
      return dur * 1000;
    }

    // ── Hearts ──
    function spawnHearts(count = 5) {
      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          const h = document.createElement('div');
          h.className = 'heart';
          const r = dog.getBoundingClientRect();
          h.style.left = (r.left + Math.random() * r.width) + 'px';
          h.style.top  = (r.top + 20) + 'px';
          h.textContent = ['❤️','🧡','💛','💕','🐾'][Math.floor(Math.random()*5)];
          document.body.appendChild(h);
          h.addEventListener('animationend', () => h.remove());
        }, i * 80);
      }
    }

    // ── Movements ──
    const MOVES = ['walk', 'run', 'sniff', 'sit', 'spin', 'roll', 'shake'];

    function setMove(move, durationMs) {
      isBusy = (move !== 'walk' && move !== 'run');
      currentMove = move;
      dog.className = 'dog move-' + move;

      if (durationMs) {
        setTimeout(() => {
          isBusy = false;
          currentMove = 'walk';
          dog.className = 'dog move-walk';
        }, durationMs);
      }
    }

    // Random behavior scheduler
    function scheduleRandomMove() {
      const delay = 4000 + Math.random() * 6000;
      setTimeout(() => {
        if (!isBusy) {
          const moves = ['walk','walk','run','sniff','sit','spin','roll','shake'];
          const pick  = moves[Math.floor(Math.random() * moves.length)];
          const durations = { sit:2200, spin:700, roll:1000, shake:700, sniff:2000, run:2500 };
          setMove(pick, durations[pick] || null);
        }
        scheduleRandomMove();
      }, delay);
    }
    scheduleRandomMove();

    function scheduleAutoJump() {
      const delay = 2200 + Math.random() * 3000;
      setTimeout(() => {
        if (!isAutoJumping && dogY === 0 && !isBusy) {
          const force = 10 + Math.random() * 8; // 점프 높이 랜덤
          dogVY = force;
          isAutoJumping = true;
        }
        scheduleAutoJump();
      }, delay);
    }

    // ── Snack data ──
    const SNACK_REACTIONS = {
      chicken: { move:'spin',   dur:700,  hearts:6 },
      cake:    { move:'jump',   dur:800,  hearts:7 },
      steak:   { move:'roll',   dur:1000, hearts:10 },
    };
    const SNACK_EMOJIS = { chicken:'🍗', cake:'🎂', steak:'🥩' };

    const FAIL_RATES = { chicken: 0.15, cake: 0.25, steak: 0.35 };

    function getFailRate(snackType) {
      let rate = FAIL_RATES[snackType] || 0.2;
      if (dogY > 80) rate += 0.35;
      else if (dogY > 40) rate += 0.2;
      return rate;
    }

    function spawnMissPopup(dogX) {
      const el = document.createElement('div');
      el.className = 'miss-popup';
      el.textContent = 'MISS! 💨';
      el.style.left = (dogX + 20 + Math.random() * 40) + 'px';
      el.style.top  = (window.innerHeight * 0.72 - 60) + 'px';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    // ── Selected snack state ──
    let selectedSnackBtn = null;

    function selectSnack(btn) {
      // 잠금 체크
      if (btn.classList.contains('locked')) {
        const lv = btn.dataset.unlockLevel;
        showToast(`🔒 Level ${lv} 달성 후 해금!`);
        return;
      }
      // 이미 선택된 버튼이면 선택 해제
      if (selectedSnackBtn === btn) {
        btn.classList.remove('selected');
        selectedSnackBtn = null;
        cursor.textContent = '🦴';
        return;
      }
      // 다른 버튼 선택 해제 후 현재 선택
      document.querySelectorAll('.snack-btn').forEach(b => b.classList.remove('selected'));
      selectedSnackBtn = btn;
      btn.classList.add('selected');
      cursor.textContent = SNACK_EMOJIS[btn.dataset.snack];
    }

    // ── Click dog → give selected snack ──
    dog.addEventListener('click', () => {
      if (selectedSnackBtn && !selectedSnackBtn.classList.contains('cooling')) {
        const btn  = selectedSnackBtn;
        const type = btn.dataset.snack;
        // data-ground="true" 간식은 써니가 땅에 있을 때만 가능
        if (btn.dataset.ground === 'true' && dogY > 40) {
          speech.textContent = '점프 중엔 못 받아요! 🐾';
          speech.classList.add('show');
          if (speechTO) clearTimeout(speechTO);
          speechTO = setTimeout(() => speech.classList.remove('show'), 1500);
          return;
        }
        const pts  = parseInt(btn.dataset.pts);
        const cd   = parseInt(btn.dataset.cd);

        // 선택 해제
        btn.classList.remove('selected');
        selectedSnackBtn = null;
        cursor.textContent = '🦴';

        // 쿨타임
        btn.classList.add('cooling');
        let remaining = Math.ceil(cd / 1000);
        const ring = btn.querySelector('.cooldown-ring');
        ring.textContent = remaining + 's';
        const cdInterval = setInterval(() => {
          remaining--;
          ring.textContent = remaining > 0 ? remaining + 's' : '';
          if (remaining <= 0) { clearInterval(cdInterval); btn.classList.remove('cooling'); }
        }, 1000);

        // 간식 던지기 애니메이션
        const dogRect = dog.getBoundingClientRect();
        const throwDur = throwSnack(
          SNACK_EMOJIS[type],
          dogRect.left + dogRect.width / 2,
          dogRect.top  + dogRect.height / 2
        );

        // 반응 + 점수 (실패 판정 포함)
        setTimeout(() => {
          const failed = Math.random() < getFailRate(type);
          if (failed) {
            // 실패
            comboCount = 0;
            comboDisplayEl.textContent = '';
            comboDisplayEl.classList.remove('active');
            setMove('shake', 600);
            showSpeech('miss');
            spawnMissPopup(x);
          } else {
            // 성공
            addCombo();
            const finalPts = Math.round(pts * getComboMultiplier());
            score += finalPts;
            updateHUD(finalPts);
            updateMood();
            recoverHunger(type);
            spawnScorePopup(finalPts, x);
            const rx = SNACK_REACTIONS[type];
            setMove(rx.move, rx.dur);
            showSpeech(type);
            spawnHearts(rx.hearts);
          }
        }, throwDur);

      } else if (!isBusy) {
        // 간식 없이 클릭 → 랜덤 반응
        const spontaneous = ['sniff','sit','spin','jump','shake'];
        const pick = spontaneous[Math.floor(Math.random() * spontaneous.length)];
        const durations = { sit:2200, spin:700, jump:800, shake:700, sniff:2000 };
        setMove(pick, durations[pick] || 1000);
        const clickLines = ['간식은요? 👀','같이 놀자!','쓰다듬어줘!','배고파요~','간식 주세요! 🥺'];
        speech.textContent = clickLines[Math.floor(Math.random() * clickLines.length)];
        speech.classList.add('show');
        if (speechTO) clearTimeout(speechTO);
        speechTO = setTimeout(() => speech.classList.remove('show'), 1800);
      }
    });

    // ── Hunger system ──
    const hungerBarEl = document.getElementById('hungerBar');

    function startHungerSystem() {
      setInterval(() => {
        hunger = Math.max(0, hunger - 1);
        updateHungerUI();
        if (hunger === 0) {
          score = Math.max(0, score - 2);
          updateHUD(0);
          showSpeech('hunger');
        }
      }, 1000);
    }

    function updateHungerUI() {
      hungerBarEl.style.width = hunger + '%';
      if (hunger <= 20) {
        hungerBarEl.classList.add('critical');
      } else {
        hungerBarEl.classList.remove('critical');
      }
    }

    function recoverHunger(snackType) {
      hunger = Math.min(100, hunger + (HUNGER_RECOVERY[snackType] || 10));
      updateHungerUI();
    }

    // ── Obstacle system ──
    function scheduleObstacle() {
      const dogLv = getDogLevel(score);
      // 레벨이 올라갈수록 더 빠르게 등장
      const base = dogLv === 3 ? 5000 : dogLv === 2 ? 7000 : 9000;
      const rand = dogLv === 3 ? 5000 : dogLv === 2 ? 6000 : 8000;
      const delay = base + Math.random() * rand;
      obstacleTimeout = setTimeout(spawnObstacle, delay);
    }

    function spawnObstacle() {
      const obs = OBSTACLES[Math.floor(Math.random() * OBSTACLES.length)];
      const el = document.createElement('div');
      el.className = 'obstacle';
      el.textContent = obs.emoji;

      const dogLv = getDogLevel(score);
      const baseSpeed = dogLv === 3 ? 1.8 : dogLv === 2 ? 2.5 : 3.2;
      const dur = baseSpeed + Math.random() * 1.2;
      el.style.setProperty('--dur', dur + 's');

      document.body.appendChild(el);

      el.addEventListener('click', () => {
        el.classList.add('obstacle-hit');
        el.style.animation = 'obstacleHit 0.3s ease forwards';
        const bonus = 5;
        score += bonus;
        updateHUD(bonus);
        spawnScorePopup(bonus, x);
        showToast('💨 회피 성공! +' + bonus);
        setMove('jump', 800);
        setTimeout(() => el.remove(), 300);
      });

      const checkCollision = setInterval(() => {
        if (!el.parentNode) { clearInterval(checkCollision); return; }
        const obsRect = el.getBoundingClientRect();
        const dogRect = document.getElementById('dog').getBoundingClientRect();

        const overlap = !(obsRect.right < dogRect.left ||
                          obsRect.left > dogRect.right ||
                          obsRect.bottom < dogRect.top ||
                          obsRect.top > dogRect.bottom);

        if (overlap) {
          clearInterval(checkCollision);
          el.remove();
          score = Math.max(0, score - obs.penalty);
          updateHUD(0);
          showToast('💥 ' + obs.label + '! -' + obs.penalty);
          showSpeech('hurt');
          setMove('shake', 600);
        }
      }, 100);

      el.addEventListener('animationend', () => {
        clearInterval(checkCollision);
        if (el.parentNode) el.remove();
      });

      // Level 3에서는 연속 2개 장애물
      if (getDogLevel(score) === 3 && Math.random() < 0.4) {
        setTimeout(spawnObstacle, 1500 + Math.random() * 1000);
      }

      scheduleObstacle();
    }

    // ── Combo system ──
    const comboDisplayEl = document.getElementById('comboDisplay');

    function addCombo() {
      const now = Date.now();
      if (now - lastSnackTime < COMBO_WINDOW) {
        comboCount++;
      } else {
        comboCount = 1;
      }
      lastSnackTime = now;

      if (comboTimer) clearTimeout(comboTimer);
      comboTimer = setTimeout(() => {
        comboCount = 0;
        comboDisplayEl.textContent = '';
        comboDisplayEl.classList.remove('active');
      }, COMBO_WINDOW);

      updateComboUI();
    }

    function updateComboUI() {
      if (comboCount >= 2) {
        const multi = comboCount >= 3 ? '×2' : '×1.5';
        comboDisplayEl.textContent = '🔥 COMBO ' + multi;
        comboDisplayEl.classList.remove('active');
        void comboDisplayEl.offsetWidth;
        comboDisplayEl.classList.add('active');
      } else {
        comboDisplayEl.textContent = '';
      }
    }

    function getComboMultiplier() {
      if (comboCount >= 3) return 2.0;
      if (comboCount >= 2) return 1.5;
      return 1.0;
    }

    // ── Speed ──
    function setSpeed(s, btn) {
      speed = s;
      if (s >= 4) { currentMove = 'run'; dog.className = 'dog move-run'; }
      else        { currentMove = 'walk'; dog.className = 'dog move-walk'; }
      document.querySelectorAll('.spd-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>
</body>
</html>
